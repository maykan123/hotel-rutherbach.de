    <!-- Google Tag (G-KHS034GVZ1) - DSGVO-konform: Nur nach Cookie-Consent geladen -->
    <script>
      // Prüfe Cookie-Consent beim Seitenstart
      (function() {
        const storedConsent = localStorage.getItem('hotel-rutherbach-consent');
        if (storedConsent) {
          try {
            const consent = JSON.parse(storedConsent);
            if (consent.statistics || consent.marketing) {

          } catch (e) {

          }

        // Listener für Consent-Änderungen
        window.addEventListener('cookieConsentChanged', function(e) {
          if (e.detail && (e.detail.statistics || e.detail.marketing)) {
            loadGoogleTag();
          }
        });

        function loadGoogleTag() {
          if (window.gtagLoaded) return;
          window.gtagLoaded = true;
          
          var script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-KHS034GVZ1';
          document.head.appendChild(script);
          
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-KHS034GVZ1');
        }
      })();
